name: Test Suites

# We are a reusable Workflow only
on:
  workflow_call:

jobs:
  tests:
    runs-on: ubuntu-latest
    name: Tests
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        cfengine: [ "lucee@6", "lucee@7", "adobe@2023", "adobe@2025" ]
        coldbox: [ "coldbox@8" ]
        experimental: [ false ]
        include:
            # BoxLang 1 with CFML compat (stable)
            - cfengine: "boxlang@1"
              coldbox: "coldbox@8"
              experimental: false
              compat: true
            # BoxLang 1 without CFML compat, esapi only (stable)
            - cfengine: "boxlang@1"
              coldbox: "coldbox@8"
              experimental: false
              compat: false
            # CFML engines against coldbox@be (experimental)
            - cfengine: "lucee@6"
              coldbox: "coldbox@be"
              experimental: true
            - cfengine: "lucee@7"
              coldbox: "coldbox@be"
              experimental: true
            - cfengine: "adobe@2023"
              coldbox: "coldbox@be"
              experimental: true
            - cfengine: "adobe@2025"
              coldbox: "coldbox@be"
              experimental: true
            # BoxLang 1 with compat against coldbox@be (experimental)
            - cfengine: "boxlang@1"
              coldbox: "coldbox@be"
              experimental: true
              compat: true
            # BoxLang 1 without compat against coldbox@be (experimental)
            - cfengine: "boxlang@1"
              coldbox: "coldbox@be"
              experimental: true
              compat: false
            # BoxLang BE with compat, coldbox@8 (experimental)
            - cfengine: "boxlang@be"
              coldbox: "coldbox@8"
              experimental: true
              compat: true
            # BoxLang BE without compat, coldbox@8 (experimental)
            - cfengine: "boxlang@be"
              coldbox: "coldbox@8"
              experimental: true
              compat: false
            # BoxLang BE with compat, coldbox@be (experimental)
            - cfengine: "boxlang@be"
              coldbox: "coldbox@be"
              experimental: true
              compat: true
            # BoxLang BE without compat, coldbox@be (experimental)
            - cfengine: "boxlang@be"
              coldbox: "coldbox@be"
              experimental: true
              compat: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set Up CommandBox
        uses: Ortus-Solutions/setup-commandbox@v2.0.1

      - name: Install dependencies
        run: |
          box install
          box install ${{ matrix.coldbox }} --noSave

      - name: BoxLang Modules (with CFML compat)
        if: contains(matrix.cfengine, 'boxlang') && matrix.compat
        run: box server set scripts.onServerInitialInstall="install bx-compat-cfml,bx-esapi --noSave"

      - name: BoxLang Modules (esapi only)
        if: contains(matrix.cfengine, 'boxlang') && !matrix.compat
        run: box server set scripts.onServerInitialInstall="install bx-esapi --noSave"

      - name: Start server
        run: box server start cfengine=${{ matrix.cfengine }} --noSaveSettings

      - name: Run TestBox Tests
        run: box testbox run
